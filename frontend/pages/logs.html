<div class="header">
  <h1>📋 Nhật Ký Hoạt Động</h1>
  <div class="status-bar">
    <span class="status-indicator"></span>
    <span id="logs-status">Đang tải...</span>
  </div>
</div>

<!-- Thống kê tổng hợp -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon">📊</div>
    <div class="stat-label">Tổng phiên</div>
    <div class="stat-value"><span id="stat-total">0</span></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">📅</div>
    <div class="stat-label">Hôm nay</div>
    <div class="stat-value"><span id="stat-today">0</span></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">📏</div>
    <div class="stat-label">Tổng quãng đường</div>
    <div class="stat-value">
      <span id="stat-distance">0</span>
      <span class="stat-unit">m</span>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">⏱️</div>
    <div class="stat-label">Tổng thời gian</div>
    <div class="stat-value" style="font-size: 1.4rem;"><span id="stat-duration">00:00:00</span></div>
  </div>
</div>

<!-- Bộ lọc -->
<div class="logs-container">
  <div class="logs-toolbar">
    <div class="logs-filters">
      <select id="filter-mode" class="logs-select" onchange="filterSessions()">
        <option value="">📋 Tất cả</option>
        <option value="auto">⚡ Tự động</option>
        <option value="manual">🎮 Điều khiển từ xa</option>
      </select>
    </div>
    <div class="logs-actions">
      <button class="logs-btn refresh-btn" onclick="loadSessions(1)">🔄 Làm mới</button>
      <button class="logs-btn danger-btn" onclick="confirmClearSessions()">🗑️ Xóa tất cả</button>
    </div>
  </div>

  <!-- Bảng nhật ký -->
  <div class="logs-table-wrapper">
    <table class="logs-table">
      <thead>
        <tr>
          <th style="width: 40px;">#</th>
          <th style="width: 100px;">📌 Chế độ</th>
          <th style="width: 150px;">🕐 Bắt đầu</th>
          <th style="width: 150px;">🕐 Kết thúc</th>
          <th style="width: 120px;">⏱️ Thời gian</th>
          <th style="width: 120px;">📏 Quãng đường</th>
          <th style="width: 50px;">🗑️</th>
        </tr>
      </thead>
      <tbody id="logs-tbody">
        <tr>
          <td colspan="7" class="logs-empty">Đang tải nhật ký...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Phân trang -->
  <div class="logs-pagination">
    <button class="logs-btn page-btn" id="btn-prev" onclick="changePage(-1)" disabled>◄ Trước</button>
    <span id="page-info" class="page-info">Trang 1/1</span>
    <button class="logs-btn page-btn" id="btn-next" onclick="changePage(1)" disabled>Sau ►</button>
  </div>
</div>
